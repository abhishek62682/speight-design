<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Hero Intro Loader | Demo (fixed)</title>
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Instrument+Sans:ital,wght@0,400..700;1,400..700&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css" rel="stylesheet" />
<style>
  body { font-family: "Instrument Sans", sans-serif; margin:0; }
  .font-primary { font-family: "Cinzel Decorative", serif; }

  /* ---------- INTRO LOADER ---------- */
  #introLoader {
    position: fixed;
    inset: 0;
    z-index: 200;
    background: #ece7de;
    overflow: hidden;
  }

  /*
    Each .intro-img is ALWAYS full-viewport-sized (inset:0) — its visible
    "card" look comes purely from a CSS scale transform, never from
    width/height/top/left. That means the only things GSAP ever animates
    are transform (scale, y) and opacity/border-radius/box-shadow — all
    cheap, GPU-composited properties. No layout reflow = no glitch, even
    when the third image "grows" to fill the whole screen.
  */
  .intro-img {
    position: absolute;
    inset: 0;
    overflow: hidden;
    transform-origin: center center;
    will-change: transform, opacity;
    border-radius: 6px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.25);
    backface-visibility: hidden;
  }
  .intro-img img { width:100%; height:100%; object-fit:cover; display:block; }

  .intro-img-1 { z-index: 1; }
  .intro-img-2 { z-index: 2; }
  .intro-img-3 { z-index: 3; }
</style>
</head>
<body>

<!-- ================= INTRO LOADER ================= -->
<div id="introLoader">
  <div class="intro-img intro-img-1">
    <img src="https://framerusercontent.com/images/O64BvWg7qKxhwTsoaMwOogOpIws.png?scale-down-to=512&width=1200&height=1200" alt="">
  </div>
  <div class="intro-img intro-img-2">
    <img src="https://framerusercontent.com/images/s2qN6O29ysWc0QRn7Kdicvodk.png?scale-down-to=1024&width=800&height=1200" alt="">
  </div>
  <div class="intro-img intro-img-3">
    <img src="https://framerusercontent.com/images/IaVcYeEdcZnfOMACnHKhRG2eA.jpg?width=3840&height=2879" alt="">
  </div>
</div>

<!-- ================= YOUR REAL HEADER (unchanged) ================= -->
<div class="root relative">

  <header class="relative" id="home">
    <nav id="mainNav" class="py-4 px-4 sm:px-6 z-[20] fixed w-full flex justify-between items-center transition-transform duration-500 ease-in-out">
      <div id="openMenuBtn" class="nav-left order-2 sm:order-1 cursor-pointer bg-white px-3 sm:px-3.5 leading-none py-2.5 flex items-center gap-2 sm:gap-2.5 rounded-full">
        <i class="ri-menu-line text-[18px] leading-none block"></i>
        <span class="text-csm leading-4">Menu</span>
      </div>
      <div class="nav-right order-3 block">
        <button class="h-[38px] bg-white px-3.5 sm:px-4 rounded-full font-medium text-[13px] sm:text-csm leading-[19px]">
          Let's Connect
        </button>
      </div>
    </nav>

    <div class="hero-frame h-[100svh]">
      <img class="w-full h-full object-cover" src="https://framerusercontent.com/images/IaVcYeEdcZnfOMACnHKhRG2eA.jpg?width=3840&height=2879" alt="">
    </div>

    <div class="hero-overlay z-[10] absolute inset-0 bg-black/20"></div>

    <div class="hero-content absolute bottom-[30px] sm:bottom-[45px] md:bottom-[60px] w-full z-[30]">
      <div class="px-4 sm:px-6 space-y-5 sm:space-y-6 md:space-y-8">
        <h2 class="text-[42px] font-primary sm:text-[64px] md:text-[88px] lg:text-[112px] font-medium text-white leading-[46px] sm:leading-[66px] md:leading-[90px]">
          speight designs
        </h2>
        <div class="horizontal-line bg-[#ced1d659] h-[1px]"></div>
        <div class="hero-bottom-content grid grid-cols-1 sm:grid-cols-12 gap-3 sm:gap-4 text-white">
          <p class="text-[14px] sm:text-[16px] sm:col-span-3 flex gap-2.5 items-center leading-[22px]">
            <span class="block size-2 bg-white rounded-full"></span> Great Design. Flawless Execution.
          </p>
          <div class="sm:col-span-6">
            <p class="text-[15px] sm:text-[18px] max-w-[400px] font-normal leading-[22px] sm:leading-[25px]">
              We design with you in mind. Architecture, Interior Design, and PMC services crafted to bring your vision to life with thoughtful design and quality execution.
            </p>
          </div>
        </div>
      </div>
    </div>
  </header>

  <div style="height:100vh;display:flex;align-items:center;justify-content:center;color:#5d5346;font-size:13px;letter-spacing:1px;text-transform:uppercase;">
    rest of the page goes here
  </div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script>
  // Card scale for each image while it's still a "card" (fraction of full viewport).
  // Because each .intro-img is always inset:0 (full viewport sized), scaling it
  // down keeps the SAME aspect ratio as the viewport itself (landscape on desktop)
  // and keeps it perfectly centered automatically — no top/left/translate math needed.
  const CARD_SCALE = { 1: 0.34, 2: 0.48, 3: 0.62 };

  // Starting state: each card at its target size, pushed below the viewport, invisible
  gsap.set(".intro-img-1", { scale: CARD_SCALE[1], y: "55vh", opacity: 0 });
  gsap.set(".intro-img-2", { scale: CARD_SCALE[2], y: "55vh", opacity: 0 });
  gsap.set(".intro-img-3", { scale: CARD_SCALE[3], y: "55vh", opacity: 0 });
  gsap.set("#mainNav, .hero-content", { opacity: 0, y: 20 });

  // Lock scroll while the intro plays
  document.documentElement.style.overflow = "hidden";

  function playIntro() {
    const tl = gsap.timeline({
      defaults: { ease: "power2.out" },
      onComplete: () => {
        document.documentElement.style.overflow = "";
        document.getElementById("introLoader").style.display = "none";
      }
    });

    tl
      // 1) first card rises from bottom to dead center, at its own size
      .to(".intro-img-1", { y: 0, opacity: 1, duration: 0.9 })

      // 2) second card rises in, bigger, layered above — first stays visible behind it
      .to(".intro-img-2", { y: 0, opacity: 1, duration: 0.9 }, "-=0.55")

      // 3) third card (the real hero shot) rises in, biggest of the three
      .to(".intro-img-3", { y: 0, opacity: 1, duration: 0.9 }, "-=0.55")

      // 4) merge: first two fade back, third scales up to fill the screen —
      //    ONLY scale/opacity/border-radius/box-shadow are animated here,
      //    nothing that triggers layout, so this stays perfectly smooth.
      .to(".intro-img-1, .intro-img-2", { opacity: 0, duration: 0.6 }, "merge")
      .to(".intro-img-3", {
          scale: 1,
          borderRadius: 0,
          boxShadow: "none",
          duration: 1.1,
          ease: "power2.inOut"
        }, "merge")

      // 5) fade the whole loader out, revealing the real header underneath
      .to("#introLoader", { opacity: 0, duration: 0.5 }, "merge+=0.95")

      // 6) nav + hero content fade/slide up in
      .to("#mainNav, .hero-content", { opacity: 1, y: 0, duration: 0.8 }, "merge+=1.1");
  }

  window.addEventListener("load", playIntro);
</script>

</body>
</html>
